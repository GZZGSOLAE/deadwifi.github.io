<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebForge | Free AI Website Maker</title>
    <meta name="description" content="Create stunning websites with AI assistance. Auto-deploy to GitHub Pages with custom domains.">
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f0a2e 100%);
            background-attachment: fixed;
            color: #e2e1e9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.8) 0%, rgba(99, 102, 241, 0.3) 100%);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) rotateZ(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px) rotateZ(360deg); opacity: 0; }
        }

        /* Container */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            min-height: 100vh;
            flex-direction: column;
        }

        /* Top Bar */
        .topbar {
            background: linear-gradient(90deg, rgba(10, 14, 39, 0.98) 0%, rgba(26, 15, 61, 0.98) 100%);
            border-bottom: 2px solid #3d2a7c;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(168, 85, 247, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .auth-section {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .auth-btn {
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            border: none;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .auth-btn:hover {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            transform: translateY(-2px);
        }

        .user-profile {
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.4);
            padding: 8px 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Left Sidebar - Templates */
        .sidebar {
            width: 280px;
            background: linear-gradient(135deg, rgba(10, 7, 20, 0.9) 0%, rgba(15, 10, 46, 0.9) 100%);
            border: 1.5px solid #2d1b5e;
            border-radius: 16px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            overflow-y: auto;
            max-height: calc(100vh - 140px);
        }

        .sidebar-title {
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #a855f7;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2d1b5e;
        }

        .template-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .template-btn {
            background: rgba(168, 85, 247, 0.08);
            border: 1.5px solid rgba(168, 85, 247, 0.2);
            color: #9b98af;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
        }

        .template-btn:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.4);
            color: #ffffff;
        }

        .template-btn.active {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.25) 0%, rgba(99, 102, 241, 0.15) 100%);
            border-color: #a855f7;
            color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }

        /* Center Area - Editor */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #2d1b5e;
        }

        .editor-title {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .editor-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            border: 1.5px solid rgba(168, 85, 247, 0.3);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .action-btn:hover {
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
            transform: translateY(-2px);
        }

        .action-btn.secondary {
            background: rgba(168, 85, 247, 0.1);
            border-color: rgba(168, 85, 247, 0.3);
            color: #a855f7;
        }

        .action-btn.secondary:hover {
            background: rgba(168, 85, 247, 0.15);
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.2);
        }

        /* Preview Area */
        .preview-container {
            background: linear-gradient(135deg, rgba(10, 7, 20, 0.8) 0%, rgba(15, 10, 46, 0.8) 100%);
            border: 1.5px solid #2d1b5e;
            border-radius: 12px;
            padding: 24px;
            min-height: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .preview-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .preview-desc {
            color: #9b98af;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .preview-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Right Sidebar - AI Assistant */
        .ai-panel {
            width: 320px;
            background: linear-gradient(135deg, rgba(10, 7, 20, 0.9) 0%, rgba(15, 10, 46, 0.9) 100%);
            border: 1.5px solid #2d1b5e;
            border-radius: 16px;
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
        }

        .ai-title {
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #a855f7;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2d1b5e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-icon {
            font-size: 1.2rem;
        }

        .ai-input-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .ai-textarea {
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            padding: 12px;
            color: #e2e1e9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 80px;
            transition: all 0.3s ease;
        }

        .ai-textarea:focus {
            outline: none;
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
        }

        .ai-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            color: #ffffff;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .ai-btn:hover {
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        .ai-suggestions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .ai-suggestion {
            background: rgba(168, 85, 247, 0.08);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            color: #b4a5d6;
        }

        .ai-suggestion:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: #a855f7;
            color: #a855f7;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(10, 7, 20, 0.95) 0%, rgba(15, 10, 46, 0.95) 100%);
            border: 1.5px solid #2d1b5e;
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .modal-input {
            width: 100%;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            padding: 12px;
            color: #e2e1e9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .modal-input:focus {
            outline: none;
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            color: #ffffff;
        }

        .modal-btn.primary:hover {
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
        }

        .modal-btn.secondary {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #a855f7;
        }

        .modal-btn.secondary:hover {
            background: rgba(168, 85, 247, 0.15);
        }

        /* Responsive */
        @media (max-width: 1400px) {
            .main-content {
                flex-direction: column;
            }

            .sidebar, .ai-panel {
                width: 100%;
                position: static;
                max-height: none;
            }
        }

        @media (max-width: 768px) {
            .topbar {
                flex-direction: column;
                gap: 12px;
            }

            .editor-title {
                font-size: 1.2rem;
            }

            .main-content {
                padding: 12px;
                gap: 12px;
            }
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Particles Background -->
    <div class="particles" id="particles"></div>

    <!-- Container -->
    <div class="container">
        <!-- Top Bar -->
        <div class="topbar">
            <div class="logo">🚀 WebForge</div>
            <div class="auth-section">
                <button class="auth-btn" id="githubAuthBtn" onclick="authenticateGitHub()">
                    <span>🐙</span> Login with GitHub
                </button>
                <div class="user-profile" id="userProfile" style="display: none;">
                    <div class="user-avatar" id="userAvatar"></div>
                    <div id="userName"></div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar - Templates -->
            <div class="sidebar">
                <div class="sidebar-title">Templates</div>
                <div class="template-list" id="templates"></div>
            </div>

            <!-- Editor Area -->
            <div class="editor-area">
                <div class="editor-header">
                    <div>
                        <h2 class="editor-title" id="editorTitle">Portfolio</h2>
                    </div>
                    <div class="editor-actions">
                        <button class="action-btn secondary" onclick="previewWebsite()">👁️ Preview</button>
                        <button class="action-btn" onclick="deployWebsite()">🚀 Deploy</button>
                    </div>
                </div>
                <div class="preview-container" id="previewContainer">
                    <div class="preview-title">Welcome to Your Website</div>
                    <div class="preview-desc">Select a template to get started building your amazing website with AI assistance.</div>
                    <div class="preview-buttons">
                        <button class="action-btn">Learn More</button>
                        <button class="action-btn secondary">Get Started</button>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar - AI Assistant -->
            <div class="ai-panel">
                <div class="ai-title">
                    <span class="ai-icon">✨</span>
                    AI Assistant
                </div>
                <div class="ai-input-section">
                    <textarea class="ai-textarea" id="aiPrompt" placeholder="Tell the AI what you want... 'Add a hero section with a call-to-action button'"></textarea>
                    <button class="ai-btn" onclick="askAI()">Generate</button>
                </div>
                <div class="ai-suggestions" id="aiSuggestions"></div>
            </div>
        </div>
    </div>

    <!-- Deploy Modal -->
    <div class="modal" id="deployModal">
        <div class="modal-content">
            <div class="modal-header">Deploy Your Website</div>
            <input type="text" class="modal-input" id="repoName" placeholder="Repository name (e.g., my-portfolio)">
            <input type="text" class="modal-input" id="siteName" placeholder="Site name (e.g., My Portfolio)">
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="createAndDeploy()">Create & Deploy</button>
                <button class="modal-btn secondary" onclick="closeModal('deployModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Template Data
        const templates = [
            { id: 'portfolio', name: 'Portfolio', icon: '👨‍💼' },
            { id: 'blog', name: 'Blog', icon: '📝' },
            { id: 'business', name: 'Business', icon: '🏢' },
            { id: 'shop', name: 'Shop', icon: '🛍️' },
            { id: 'docs', name: 'Documentation', icon: '📚' }
        ];

        const templateContent = {
            portfolio: {
                title: 'Portfolio',
                preview: `
                    <div class="preview-title">Welcome to My Portfolio</div>
                    <div class="preview-desc">I'm a creative developer passionate about building beautiful web experiences. Check out my latest projects below.</div>
                    <div class="preview-buttons">
                        <button class="action-btn">View My Work</button>
                        <button class="action-btn secondary">Contact Me</button>
                    </div>
                `,
                html: '<!-- Portfolio HTML will be generated here -->'
            },
            blog: {
                title: 'Blog',
                preview: `
                    <div class="preview-title">My Blog</div>
                    <div class="preview-desc">Stories, insights, and thoughts on web development, design, and technology.</div>
                    <div class="preview-buttons">
                        <button class="action-btn">Read Latest Post</button>
                        <button class="action-btn secondary">Browse All Posts</button>
                    </div>
                `,
                html: '<!-- Blog HTML will be generated here -->'
            },
            business: {
                title: 'Business',
                preview: `
                    <div class="preview-title">Our Business</div>
                    <div class="preview-desc">We help companies succeed through innovative digital solutions and expert consulting.</div>
                    <div class="preview-buttons">
                        <button class="action-btn">Get a Quote</button>
                        <button class="action-btn secondary">Learn More</button>
                    </div>
                `,
                html: '<!-- Business HTML will be generated here -->'
            },
            shop: {
                title: 'Shop',
                preview: `
                    <div class="preview-title">Welcome to Our Store</div>
                    <div class="preview-desc">Discover amazing products handpicked just for you. Fast shipping & great prices.</div>
                    <div class="preview-buttons">
                        <button class="action-btn">Shop Now</button>
                        <button class="action-btn secondary">View Sale Items</button>
                    </div>
                `,
                html: '<!-- Shop HTML will be generated here -->'
            },
            docs: {
                title: 'Documentation',
                preview: `
                    <div class="preview-title">Documentation</div>
                    <div class="preview-desc">Complete guides and API documentation to help you get started with our platform.</div>
                    <div class="preview-buttons">
                        <button class="action-btn">Get Started</button>
                        <button class="action-btn secondary">API Reference</button>
                    </div>
                `,
                html: '<!-- Docs HTML will be generated here -->'
            }
        };

        let currentTemplate = 'portfolio';
        let userGitHubData = null;
        let accessToken = null;

        // Create Particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (2 + Math.random() * 6) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.opacity = 0.3 + Math.random() * 0.5;
                container.appendChild(particle);
            }
        }

        // Initialize Templates
        function initTemplates() {
            const container = document.getElementById('templates');
            templates.forEach(template => {
                const btn = document.createElement('button');
                btn.className = 'template-btn' + (template.id === 'portfolio' ? ' active' : '');
                btn.textContent = `${template.icon} ${template.name}`;
                btn.onclick = () => selectTemplate(template.id, btn);
                container.appendChild(btn);
            });
        }

        // Select Template
        function selectTemplate(id, btn) {
            currentTemplate = id;
            document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('editorTitle').textContent = templateContent[id].title;
            document.getElementById('previewContainer').innerHTML = templateContent[id].preview;
            showAISuggestions(id);
        }

        // Show AI Suggestions
        function showAISuggestions(templateId) {
            const suggestions = {
                portfolio: [
                    '✨ Add hero section with background image',
                    '📸 Create projects gallery with hover effects',
                    '📧 Add contact form',
                    '🎯 Add testimonials section',
                    '💼 Add skills/experience section'
                ],
                blog: [
                    '📰 Add recent posts section',
                    '🏷️ Add categories and tags',
                    '💬 Add comments system',
                    '🔍 Add search functionality',
                    '📅 Add blog archive'
                ],
                business: [
                    '💼 Add services section',
                    '👥 Add team profiles',
                    '📊 Add statistics/metrics',
                    '💬 Add client testimonials',
                    '📞 Add contact form'
                ],
                shop: [
                    '🛍️ Add product grid',
                    '💰 Add shopping cart',
                    '⭐ Add product reviews',
                    '🏷️ Add filters and search',
                    '🚚 Add shipping info'
                ],
                docs: [
                    '📑 Add table of contents',
                    '🔍 Add search functionality',
                    '💻 Add code examples',
                    '📖 Add FAQ section',
                    '🔗 Add related links'
                ]
            };

            const container = document.getElementById('aiSuggestions');
            container.innerHTML = '';
            suggestions[templateId].forEach(suggestion => {
                const div = document.createElement('div');
                div.className = 'ai-suggestion';
                div.textContent = suggestion;
                div.onclick = () => askAI(suggestion);
                container.appendChild(div);
            });
        }

        // Ask AI
        function askAI(suggestion) {
            const prompt = suggestion || document.getElementById('aiPrompt').value;
            if (!prompt.trim()) return;

            alert(`🤖 AI Assistant:\n\n"${prompt}"\n\nI've generated code for this feature. It will be added to your website preview above!`);
            document.getElementById('aiPrompt').value = '';
        }

        // GitHub Authentication
        function authenticateGitHub() {
            alert('In a real implementation, this would redirect to GitHub OAuth.\n\nFor demo: Simulating login...');
            
            // Simulate login
            userGitHubData = {
                login: 'your-username',
                name: 'Your Name',
                avatar_url: '👤'
            };
            
            document.getElementById('githubAuthBtn').style.display = 'none';
            document.getElementById('userProfile').style.display = 'flex';
            document.getElementById('userName').textContent = userGitHubData.login;
            document.getElementById('userAvatar').textContent = userGitHubData.avatar_url;
        }

        // Preview Website
        function previewWebsite() {
            alert('Opening live preview in new window...');
            // In real implementation, open preview in new window
        }

        // Deploy Website
        function deployWebsite() {
            if (!userGitHubData) {
                alert('Please login with GitHub first');
                return;
            }
            document.getElementById('deployModal').classList.add('active');
        }

        // Create and Deploy
        function createAndDeploy() {
            const repoName = document.getElementById('repoName').value;
            const siteName = document.getElementById('siteName').value;

            if (!repoName || !siteName) {
                alert('Please fill in all fields');
                return;
            }

            alert(`✅ Success!\n\nRepository created: ${userGitHubData.login}/${repoName}\nSite name: ${siteName}\nDeploying to GitHub Pages...\n\nYour site will be live at: https://${userGitHubData.login}.github.io/${repoName}`);
            closeModal('deployModal');
        }

        // Modal Functions
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            initTemplates();
            showAISuggestions('portfolio');
        });

        // Close modal when clicking outside
        document.querySelectorAll('.modal').forEach(modal => {
            modal.onclick = (e) => {
                if (e.target === modal) closeModal(modal.id);
            };
        });
    </script>
</body>
</html>
