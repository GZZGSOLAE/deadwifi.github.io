<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidedV1 | Premium Minecraft Client</title>
    <meta name="description" content="VoidedV1 - Premium Click GUI Minecraft Client for 1.21.11 | Fabric API">
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f0a2e 100%);
            background-attachment: fixed;
            color: #e2e1e9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.8) 0%, rgba(99, 102, 241, 0.3) 100%);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) rotateZ(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px) rotateZ(360deg); opacity: 0; }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(26, 26, 62, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.6);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 0.8);
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            min-height: 100vh;
            flex-direction: column;
        }

        /* Top Bar */
        .topbar {
            background: linear-gradient(90deg, rgba(10, 14, 39, 0.98) 0%, rgba(26, 15, 61, 0.98) 100%);
            border-bottom: 2px solid #3d2a7c;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(168, 85, 247, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .version-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .version-badge {
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.4);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a855f7;
            transition: all 0.3s ease;
        }

        .version-badge:hover {
            background: rgba(168, 85, 247, 0.25);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }

        .music-toggle {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.4);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            color: #6366f1;
            transition: all 0.3s ease;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .music-toggle:hover {
            background: rgba(99, 102, 241, 0.25);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .music-dot {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            box-shadow: 0 0 8px #6366f1;
            transition: all 0.3s ease;
        }

        .music-dot.playing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 8px #6366f1; }
            50% { box-shadow: 0 0 20px #6366f1, 0 0 30px rgba(99, 102, 241, 0.6); }
        }

        /* Main Content Area */
        .main-content {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Left Sidebar - Module Categories */
        .sidebar {
            width: 280px;
            background: linear-gradient(135deg, rgba(10, 7, 20, 0.9) 0%, rgba(15, 10, 46, 0.9) 100%);
            border: 1.5px solid #2d1b5e;
            border-radius: 16px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            overflow-y: auto;
            max-height: calc(100vh - 140px);
        }

        .sidebar-title {
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #a855f7;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2d1b5e;
        }

        .category-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .category-btn {
            background: rgba(168, 85, 247, 0.08);
            border: 1.5px solid rgba(168, 85, 247, 0.2);
            color: #9b98af;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
        }

        .category-btn:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.4);
            color: #ffffff;
        }

        .category-btn.active {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.25) 0%, rgba(99, 102, 241, 0.15) 100%);
            border-color: #a855f7;
            color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }

        /* Center Area - Module Grid */
        .modules-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .module-count {
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            width: 100%;
        }

        /* Module Card */
        .module-card {
            background: linear-gradient(135deg, rgba(10, 7, 20, 0.8) 0%, rgba(15, 10, 46, 0.8) 100%);
            border: 1.5px solid #2d1b5e;
            border-radius: 12px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
        }

        .module-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.1), transparent);
            transition: left 0.5s ease;
            pointer-events: none;
        }

        .module-card:hover::before {
            left: 100%;
        }

        .module-card:hover {
            border-color: #a855f7;
            background: linear-gradient(135deg, rgba(10, 7, 20, 0.95) 0%, rgba(15, 10, 46, 0.95) 100%);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.25);
            transform: translateY(-3px);
        }

        .module-card.active {
            border-color: #a855f7;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(99, 102, 241, 0.1) 100%);
            box-shadow: inset 0 0 20px rgba(168, 85, 247, 0.1), 0 8px 25px rgba(168, 85, 247, 0.3);
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .module-name {
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .module-toggle {
            width: 32px;
            height: 18px;
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .module-toggle::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: #8c899e;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s ease;
        }

        .module-toggle.enabled {
            background: rgba(168, 85, 247, 0.4);
            border-color: #a855f7;
        }

        .module-toggle.enabled::after {
            background: #a855f7;
            transform: translateX(14px);
            box-shadow: 0 0 8px #a855f7;
        }

        .module-desc {
            font-size: 0.9rem;
            color: #9b98af;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        /* Right Sidebar - Info Panel */
        .info-panel {
            width: 320px;
            background: linear-gradient(135deg, rgba(10, 7, 20, 0.9) 0%, rgba(15, 10, 46, 0.9) 100%);
            border: 1.5px solid #2d1b5e;
            border-radius: 16px;
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .info-title {
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #a855f7;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2d1b5e;
        }

        .info-section {
            margin-bottom: 24px;
        }

        .info-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6366f1;
            margin-bottom: 8px;
        }

        .info-content {
            font-size: 0.95rem;
            color: #b4a5d6;
            line-height: 1.6;
        }

        .info-badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #6366f1;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .stat-item {
            background: rgba(168, 85, 247, 0.08);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: #a855f7;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #8c899e;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #2d1b5e;
        }

        .action-btn {
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            border: 1.5px solid rgba(168, 85, 247, 0.3);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .action-btn:hover {
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
            transform: translateY(-2px);
        }

        .action-btn.secondary {
            background: rgba(168, 85, 247, 0.1);
            border-color: rgba(168, 85, 247, 0.3);
            color: #a855f7;
        }

        .action-btn.secondary:hover {
            background: rgba(168, 85, 247, 0.15);
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.2);
        }

        /* Compatible Clients */
        .clients-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }

        .client-item {
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #b4a5d6;
        }

        .client-item strong {
            color: #6366f1;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        /* Responsive */
        @media (max-width: 1400px) {
            .main-content {
                flex-direction: column;
            }

            .sidebar, .info-panel {
                width: 100%;
                position: static;
                max-height: none;
            }

            .modules-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .topbar {
                flex-direction: column;
                gap: 12px;
            }

            .section-title {
                font-size: 1.2rem;
            }

            .modules-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Particles Background -->
    <div class="particles" id="particles"></div>

    <!-- Container -->
    <div class="container">
        <!-- Top Bar -->
        <div class="topbar">
            <div class="logo">VoidedV1</div>
            <div class="version-info">
                <div class="version-badge">Minecraft 1.21.11</div>
                <div class="version-badge">Fabric API 1.21.11</div>
                <div class="music-toggle" onclick="toggleMusic()">
                    <span class="music-dot" id="music-dot"></span>
                    <span id="music-text">🎵 Music</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-title">Modules</div>
                <div class="category-list" id="categories"></div>
            </div>

            <!-- Modules Area -->
            <div class="modules-area">
                <div class="section-header">
                    <div>
                        <h2 class="section-title" id="section-title">Combat</h2>
                    </div>
                    <div class="module-count" id="module-count">6 Modules</div>
                </div>
                <div class="modules-grid" id="modules-grid"></div>
            </div>

            <!-- Info Panel -->
            <div class="info-panel">
                <div class="info-title">Information</div>

                <div class="info-section">
                    <div class="info-label">Version</div>
                    <div class="info-content">
                        <div style="margin-bottom: 8px;">
                            <div class="info-badge">MC 1.21.11</div>
                        </div>
                        <div style="margin-bottom: 8px;">
                            <div class="info-badge">Fabric API</div>
                        </div>
                    </div>
                </div>

                <div class="info-section">
                    <div class="info-label">Compatible Clients</div>
                    <div class="clients-list">
                        <div class="client-item"><strong>✓</strong> Minecraft Launcher</div>
                        <div class="client-item"><strong>✓</strong> Feather Client</div>
                        <div class="client-item"><strong>✓</strong> Lunar Client</div>
                        <div class="client-item" style="color: #8c899e; font-size: 0.75rem; margin-top: 8px;">*Not affiliated or sponsored by any client</div>
                    </div>
                </div>

                <div class="info-section">
                    <div class="info-label">Statistics</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">28</div>
                            <div class="stat-label">Modules</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">5</div>
                            <div class="stat-label">Categories</div>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="action-btn" onclick="joinDiscord()">
                        💜 Discord Server
                    </button>
                    <button class="action-btn secondary" onclick="downloadClient()">
                        ⬇️ Download
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Audio -->
    <audio id="musicPlayer" style="display: none;">
        <source src="https://www.youtube.com/watch?v=hXCIH5VTWyg" type="audio/mpeg">
    </audio>

    <script>
        // Module Data
        const allModules = {
            combat: [
                { name: 'AutoTotem', desc: 'Automatic totem activation & offhand placement' },
                { name: 'Criticals', desc: 'Enhanced critical hit detection boost' },
                { name: 'FightBot', desc: 'Automated combat with target tracking' },
                { name: 'KeyPearl', desc: 'Quick pearl usage optimization' },
                { name: 'KillAura', desc: 'Range-based attack automation' },
                { name: 'Reach', desc: 'Extended reach multiplier' }
            ],
            render: [
                { name: 'ArmorHUD', desc: 'Armor durability display system' },
                { name: 'BlockHighlight', desc: 'Block outline visualization' },
                { name: 'Chams', desc: 'Entity wallhack system' },
                { name: 'CustomNameTags', desc: 'Custom player name rendering' },
                { name: 'DonutMinesESP', desc: 'Mine block detection' },
                { name: 'FullBright', desc: 'Brightness enhancement utility' },
                { name: 'HitPartials', desc: 'Hit damage indicators' },
                { name: 'NoRender', desc: 'Selective entity hiding' }
            ],
            movement: [
                { name: 'Fly', desc: 'Creative flight mode enabled' },
                { name: 'InfiniteJump', desc: 'Unlimited jump height' },
                { name: 'LongJump', desc: 'Extended jump distance' },
                { name: 'Parkour', desc: 'Automated parkour assist' },
                { name: 'ReverseStep', desc: 'Backward stepping enabled' },
                { name: 'Speed', desc: 'Movement velocity boost' },
                { name: 'Sprint', desc: 'Continuous sprint activation' },
                { name: 'Step', desc: 'Auto block stepping' }
            ],
            player: [
                { name: 'FastPlace', desc: 'Rapid block placement' },
                { name: 'NoFall', desc: 'Fall damage negation' },
                { name: 'Velocity', desc: 'Knockback reduction' }
            ],
            utility: [
                { name: 'ClickGui', desc: 'Interactive GUI control' },
                { name: 'HudEditor', desc: 'Customize HUD positions' },
                { name: 'AntiAFK', desc: 'Prevent AFK timeout' }
            ]
        };

        let currentCategory = 'combat';
        let musicPlaying = false;

        // Create Particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (2 + Math.random() * 6) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.opacity = 0.3 + Math.random() * 0.5;
                container.appendChild(particle);
            }
        }

        // Initialize Categories
        function initCategories() {
            const container = document.getElementById('categories');
            Object.keys(allModules).forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'category-btn' + (category === 'combat' ? ' active' : '');
                btn.textContent = category.charAt(0).toUpperCase() + category.slice(1);
                btn.onclick = () => switchCategory(category, btn);
                container.appendChild(btn);
            });
        }

        // Switch Category
        function switchCategory(category, btn) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('section-title').textContent = category.charAt(0).toUpperCase() + category.slice(1);
            document.getElementById('module-count').textContent = allModules[category].length + ' Modules';
            renderModules();
        }

        // Render Modules
        function renderModules() {
            const grid = document.getElementById('modules-grid');
            grid.innerHTML = '';
            allModules[currentCategory].forEach(module => {
                const card = document.createElement('div');
                card.className = 'module-card';
                card.innerHTML = `
                    <div class="module-header">
                        <div class="module-name">${module.name}</div>
                        <div class="module-toggle" onclick="toggleModule(event)"></div>
                    </div>
                    <div class="module-desc">${module.desc}</div>
                `;
                grid.appendChild(card);
            });
        }

        // Toggle Module
        function toggleModule(e) {
            e.stopPropagation();
            const toggle = e.target.classList.contains('module-toggle') ? e.target : e.target.closest('.module-toggle');
            toggle.classList.toggle('enabled');
            toggle.closest('.module-card').classList.toggle('active');
        }

        // Music Toggle
        function toggleMusic() {
            musicPlaying = !musicPlaying;
            const dot = document.getElementById('music-dot');
            const text = document.getElementById('music-text');
            if (musicPlaying) {
                dot.classList.add('playing');
                text.textContent = '🎵 ON';
            } else {
                dot.classList.remove('playing');
                text.textContent = '🎵 Music';
            }
        }

        // Actions
        function joinDiscord() {
            window.open('https://discord.gg/RFGAEtzH3N', '_blank');
        }

        function downloadClient() {
            alert('Download links available in Discord!\nhttps://discord.gg/RFGAEtzH3N');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            initCategories();
            renderModules();
        });
    </script>
</body>
</html>
